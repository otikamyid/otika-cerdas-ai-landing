<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Otika">
  <!-- White inner disc -->
  <circle cx="32" cy="32" r="27" fill="#ffffff" />
  <!-- Blue ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#0D8EDC" stroke-width="9" />

  <!-- Blue node network (upper cluster) -->
  <g fill="none" stroke="#0D8EDC" stroke-width="1.8" stroke-linecap="round">
    <line x1="32" y1="19" x2="23" y2="27" />
    <line x1="32" y1="19" x2="41" y2="27" />
    <line x1="23" y1="27" x2="29" y2="34" />
    <line x1="41" y1="27" x2="35" y2="34" />
    <line x1="29" y1="34" x2="35" y2="34" />
  </g>
  <g fill="#0D8EDC">
    <circle cx="32" cy="19" r="2.8" />
    <circle cx="23" cy="27" r="2.3" />
    <circle cx="41" cy="27" r="2.3" />
    <circle cx="29" cy="34" r="2" />
    <circle cx="35" cy="34" r="2" />
  </g>

  <!-- Green node network (lower cluster) -->
  <g fill="none" stroke="#00CC66" stroke-width="1.8" stroke-linecap="round">
    <line x1="32" y1="45" x2="24" y2="38" />
    <line x1="32" y1="45" x2="40" y2="38" />
    <line x1="24" y1="38" x2="32" y2="38" />
